<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="Dinesh Hari — Lead AI Engineer at BCG X, PhD candidate in data governance">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#62e6ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f471b5"/>
    </linearGradient>
    <linearGradient id="curveStroke" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#62e6ff">
        <animate attributeName="stop-color" values="#62e6ff;#a78bfa;#62e6ff" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f471b5">
        <animate attributeName="stop-color" values="#f471b5;#ffc46b;#f471b5" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#62e6ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#62e6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#97a3c4" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1280" height="420" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1280" height="420" fill="#04060d"/>
    <rect width="1280" height="420" fill="url(#grid)"/>
    <ellipse cx="180" cy="-40" rx="520" ry="300" fill="url(#glowViolet)"/>
    <ellipse cx="1100" cy="460" rx="480" ry="280" fill="url(#glowCyan)"/>

    <!-- starfield -->
    <g fill="#a7b4ff">
      <circle cx="92" cy="350" r="1.6" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="240" cy="60" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.1s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="430" cy="330" r="1.8" opacity="0.6"><animate attributeName="opacity" values="0.6;0.12;0.6" dur="2.9s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="48" r="1.2" opacity="0.55"><animate attributeName="opacity" values="0.55;0.1;0.55" dur="3.8s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="370" r="1.5" opacity="0.65"><animate attributeName="opacity" values="0.65;0.18;0.65" dur="3.1s" begin="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="800" cy="90" r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.5;0.12;0.5" dur="4.5s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="1210" cy="60" r="1.7" opacity="0.6"><animate attributeName="opacity" values="0.6;0.14;0.6" dur="3.6s" begin="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="1240" cy="330" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.7s" begin="1.4s" repeatCount="indefinite"/></circle>
      <circle cx="870" cy="40" r="1.2" opacity="0.45"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="3.3s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="60" cy="120" r="1.4" opacity="0.55"><animate attributeName="opacity" values="0.55;0.12;0.55" dur="4.2s" begin="1.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Hilbert curve, drawing itself -->
    <g>
      <path d="M920 322 L920 288 L954 288 L954 322 L988 322 L1022 322 L1022 288 L988 288 L988 254 L1022 254 L1022 220 L988 220 L954 220 L954 254 L920 254 L920 220 L920 186 L954 186 L954 152 L920 152 L920 118 L920 84 L954 84 L954 118 L988 118 L988 84 L1022 84 L1022 118 L1022 152 L988 152 L988 186 L1022 186 L1056 186 L1090 186 L1090 152 L1056 152 L1056 118 L1056 84 L1090 84 L1090 118 L1124 118 L1124 84 L1158 84 L1158 118 L1158 152 L1124 152 L1124 186 L1158 186 L1158 220 L1158 254 L1124 254 L1124 220 L1090 220 L1056 220 L1056 254 L1090 254 L1090 288 L1056 288 L1056 322 L1090 322 L1124 322 L1124 288 L1158 288 L1158 322"
            fill="none" stroke="url(#curveStroke)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
            pathLength="1000" stroke-dasharray="1000" stroke-dashoffset="1000" opacity="0.9">
        <animate attributeName="stroke-dashoffset" values="1000;0;0;1000" keyTimes="0;0.55;0.82;1" dur="16s" repeatCount="indefinite"/>
      </path>
      <circle cx="920" cy="322" r="5" fill="#62e6ff">
        <animate attributeName="opacity" values="1;1;0.2;1" keyTimes="0;0.82;0.92;1" dur="16s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1158" cy="322" r="5" fill="#f471b5">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.56;0.82;1" dur="16s" repeatCount="indefinite"/>
      </circle>
      <text x="1039" y="368" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#5b6886" letter-spacing="2">HILBERT · ORDER 3</text>
    </g>

    <!-- copy block -->
    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      <text x="72" y="120" font-size="15" font-weight="600" letter-spacing="6" fill="#62e6ff">ENGINEERING × RESEARCH</text>
      <text x="72" y="185" font-size="58" font-weight="800" fill="#e9edfb" letter-spacing="-1">Dinesh Hari</text>
      <rect x="74" y="205" width="340" height="5" rx="2.5" fill="url(#brand)">
        <animate attributeName="width" values="0;340" dur="1.6s" fill="freeze"/>
      </rect>
      <text x="72" y="248" font-size="21" font-weight="600" fill="#c7d0ec">Lead AI Engineer · BCG X</text>
      <text x="72" y="280" font-size="21" font-weight="600" fill="#c7d0ec">PhD Candidate · Data Governance &amp; Institutional Theory</text>

      <!-- metric chips -->
      <g font-size="14" font-weight="600">
        <rect x="72" y="312" width="170" height="38" rx="19" fill="none" stroke="#62e6ff" stroke-opacity="0.45"/>
        <text x="157" y="336" text-anchor="middle" fill="#62e6ff">4 research DOIs</text>
        <rect x="254" y="312" width="220" height="38" rx="19" fill="none" stroke="#a78bfa" stroke-opacity="0.5"/>
        <text x="364" y="336" text-anchor="middle" fill="#a78bfa">76-notebook curriculum</text>
        <rect x="486" y="312" width="200" height="38" rx="19" fill="none" stroke="#f471b5" stroke-opacity="0.45"/>
        <text x="586" y="336" text-anchor="middle" fill="#f471b5">6 browser labs live</text>
        <rect x="698" y="312" width="180" height="38" rx="19" fill="none" stroke="#ffc46b" stroke-opacity="0.45"/>
        <text x="788" y="336" text-anchor="middle" fill="#ffc46b">1,100+ commits</text>
      </g>
    </g>

    <rect x="1" y="1" width="1278" height="418" rx="23" fill="none" stroke="#97a3c4" stroke-opacity="0.18"/>
  </g>
</svg>
