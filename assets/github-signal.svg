<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Signal</title>
  <desc id="desc">A local profile signal panel summarizing public GitHub activity and the private-enterprise work caveat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b111c"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#181428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e94560"/>
      <stop offset="0.5" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#55d6be"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" stroke="#23364d" stroke-width="0.7" fill="none" opacity="0.5"/>
    </pattern>
    <style>
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f5f9ff; }
      .kicker { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #8aa3bb; letter-spacing: 0.16em; }
      .metric { font: 800 54px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fbff; }
      .label { font: 650 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9fb7d0; }
      .note { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #c7d3e1; }
      .mono { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #8ff2df; letter-spacing: 0.08em; }
      .line { stroke: #2c4760; stroke-width: 1.4; fill: none; }
      .hot { stroke: url(#accent); stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="24" fill="url(#grid)" opacity="0.76"/>
  <path d="M0 287 C160 240 285 310 440 250 C590 192 738 306 910 236 C1050 178 1120 216 1280 170 L1280 360 L0 360 Z" fill="#0a1422" opacity="0.76"/>
  <path d="M76 88 C200 54 314 116 430 78 C568 34 684 142 820 92 C984 32 1086 102 1204 70" class="hot" opacity="0.42"/>
  <path d="M76 292 C240 232 360 304 528 244 C688 186 810 310 990 238 C1104 192 1168 198 1204 186" class="line" opacity="0.8"/>

  <g transform="translate(72 64)">
    <text class="kicker" textLength="248" lengthAdjust="spacingAndGlyphs">PUBLIC GITHUB SIGNAL</text>
    <text class="title" y="46">Open-source activity is the visible edge, not the full work graph.</text>
  </g>

  <g transform="translate(72 144)">
    <g filter="url(#shadow)">
      <rect width="312" height="126" rx="18" fill="#101c2b" stroke="#2e4963"/>
      <text class="metric" x="28" y="62">485</text>
      <text class="label" x="28" y="94">public contributions</text>
      <text class="mono" x="28" y="116" textLength="188" lengthAdjust="spacingAndGlyphs">NOV 2014 TO PRESENT</text>
    </g>
    <g transform="translate(340 0)" filter="url(#shadow)">
      <rect width="256" height="126" rx="18" fill="#101c2b" stroke="#2e4963"/>
      <text class="metric" x="28" y="62">5</text>
      <text class="label" x="28" y="94">longest streak</text>
      <text class="mono" x="28" y="116" textLength="100" lengthAdjust="spacingAndGlyphs">APR 13-17</text>
    </g>
    <g transform="translate(624 0)" filter="url(#shadow)">
      <rect width="512" height="126" rx="18" fill="#101c2b" stroke="#2e4963"/>
      <text class="metric" x="28" y="62">1,100+</text>
      <text class="label" x="28" y="94">private enterprise commits</text>
      <text class="mono" x="28" y="116" textLength="328" lengthAdjust="spacingAndGlyphs">BCG X + ENTERPRISE DATA PLATFORMS</text>
    </g>
  </g>

  <g transform="translate(72 318)">
    <rect width="1136" height="1.5" fill="#31445a"/>
    <text class="note" x="0" y="-22" textLength="870" lengthAdjust="spacingAndGlyphs">Most commits live in private enterprise repos; the public graph is a deliberately small sample.</text>
  </g>
</svg>
